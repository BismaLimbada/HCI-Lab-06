<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Week 09: LERP Lab</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; line-height: 1.6; }
        .result-box { 
            margin-top: 20px; 
            padding: 15px; 
            background: #f0f7ff; 
            border: 2px solid #007bff; 
            border-radius: 5px; 
            width: 250px; 
        }
        input[type="number"] { width: 80px; margin-bottom: 10px; }
        .input-group { margin-bottom: 10px; }
    </style>
</head>
<body>

    <h2>LERP Calculator</h2>
    <p>Interpolate between two values using a transition weight (t).</p>
    
    <div class="input-group">
        <label>Start (A): </label>
        <input type="number" id="valA" value="0">
    </div>
    
    <div class="input-group">
        <label>End (B): &nbsp;</label>
        <input type="number" id="valB" value="100">
    </div>
    
    <p>Adjust Weight (t):</p>
    <input type="range" id="weightSlider" min="0" max="1" step="0.01" value="0.5" style="width: 280px;">

    <div class="result-box">
        <div><strong>Weight (t):</strong> <span id="tValue">0.50</span></div>
        <div><strong>Result:</strong> <span id="calculatedLerp">50.00</span></div>
    </div>

    <script>
        const inputA = document.getElementById('valA');
        const inputB = document.getElementById('valB');
        const slider = document.getElementById('weightSlider');
        const displayT = document.getElementById('tValue');
        const displayResult = document.getElementById('calculatedLerp');

        function update() {
            let a = parseFloat(inputA.value) || 0;
            let b = parseFloat(inputB.value) || 0;
            let t = parseFloat(slider.value);

            // Simple LERP logic
            let result = a + (b - a) * t;

            displayT.textContent = t.toFixed(2);
            displayResult.textContent = result.toFixed(2);
        }

        // Real-time listeners
        slider.addEventListener('input', update);
        inputA.addEventListener('input', update);
        inputB.addEventListener('input', update);

        update(); // Initial call
    </script>
</body>
</html>
